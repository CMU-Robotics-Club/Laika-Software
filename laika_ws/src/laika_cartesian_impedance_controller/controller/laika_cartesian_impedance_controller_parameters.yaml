laika_cartesian_impedance_controller:
  joints:
    type: string_array
    description: "Names of the joints to be controlled."
  stiffness:
    type: double_array
    default_value: [150.0, 150.0, 150.0]
    description: "Cartesian stiffness gains [X, Y, Z]"
  damping:
    type: double_array
    default_value: [15.0, 15.0, 15.0]
    description: "Cartesian damping gains [X, Y, Z]"
